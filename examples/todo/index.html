<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sparsha todo app example running in WebAssembly with DOM rendering."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#0f172a" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Todo - Sparsha" />
    <meta
      property="og:description"
      content="Sparsha todo app example running in WebAssembly with DOM rendering."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Todo - Sparsha" />
    <meta
      name="twitter:description"
      content="Sparsha todo app example running in WebAssembly with DOM rendering."
    />
    <title>Todo - Sparsha</title>
    <link data-trunk rel="copy-file" href="sparsha-worker.js" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0f172a;
      }

      body {
        color: #e2e8f0;
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      #sparsha-loading-shell {
        position: fixed;
        inset: 0 auto auto 0;
        width: 100%;
        height: 3px;
        background: rgba(30, 41, 59, 0.55);
        overflow: hidden;
        transition: opacity 180ms ease, visibility 180ms ease;
        z-index: 9999;
      }

      #sparsha-loading-shell .bar {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #2563eb 0%, #60a5fa 45%, #2563eb 100%);
        animation: sparsha-progress 0.9s linear infinite;
      }

      @keyframes sparsha-progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(260%);
        }
      }

      #sparsha-loading-shell.is-hidden {
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <main id="sparsha-loading-shell" aria-label="Loading">
      <div class="bar" aria-hidden="true"></div>
    </main>
    <noscript>
      <main>
        <h1>Sparsha Todo</h1>
        <p>This app needs JavaScript enabled to run.</p>
      </main>
    </noscript>
    <script>
      (() => {
        const shell = document.getElementById("sparsha-loading-shell");
        if (!shell) return;

        let hidden = false;
        const hideShell = () => {
          if (hidden) return;
          hidden = true;
          requestAnimationFrame(() => {
            shell.classList.add("is-hidden");
            shell.setAttribute("aria-hidden", "true");
          });
        };

        window.addEventListener("SparshaFirstPaint", hideShell, { once: true });

        setTimeout(hideShell, 12_000);
      })();
    </script>
    <script data-trunk src="src/main.rs" type="rust"></script>
  </body>
</html>
