name: Release Readiness

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
  SPARSH_ARTIFACT_DIR: artifacts

jobs:
  linux-release-readiness:
    name: Linux Release Readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Trunk
        run: cargo install trunk --locked
      - name: Install web dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run release-readiness suite
        run: ./scripts/release-readiness.sh
      - name: Upload release-readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-artifacts
          path: |
            playwright-report
            test-results
            artifacts

  macos-native:
    name: macOS Native
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace
      - name: Test workspace
        run: cargo test --workspace
